baseurl: "/hawaii-fishing-regulations"
url: "https://mdemichele.github.io"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.pdf"
  - README.md
  - vendor/
