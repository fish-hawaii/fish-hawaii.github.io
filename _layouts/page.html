---
layout: default
---

<div class="page-wrap">
  {% if page.breadcrumb_parent %}
  <nav class="breadcrumb">
    <a href="{{ '/' | relative_url }}">Home</a>
    &rsaquo;
    <a href="{{ page.breadcrumb_parent_url | relative_url }}">{{ page.breadcrumb_parent }}</a>
    &rsaquo;
    <span>{{ page.title }}</span>
  </nav>
  {% elsif page.show_breadcrumb %}
  <nav class="breadcrumb">
    <a href="{{ '/' | relative_url }}">Home</a>
    &rsaquo;
    <span>{{ page.title }}</span>
  </nav>
  {% endif %}

  <div class="content-card">
    {{ content }}
  </div>
</div>
